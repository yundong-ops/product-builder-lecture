<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이브 로또 (Vibe Lotto) - 프리미엄 AI 로또 번호 추천</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3f37c9;
            --secondary: #4cc9f0;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* Lotto ball colors */
            --ball-yellow: radial-gradient(circle at 30% 30%, #ffeb3b 0%, #fbc02d 50%, #f57f17 100%);
            --ball-blue: radial-gradient(circle at 30% 30%, #64b5f6 0%, #1976d2 50%, #0d47a1 100%);
            --ball-red: radial-gradient(circle at 30% 30%, #ff8a80 0%, #e53935 50%, #b71c1c 100%);
            --ball-gray: radial-gradient(circle at 30% 30%, #cfd8dc 0%, #78909c 50%, #37474f 100%);
            --ball-green: radial-gradient(circle at 30% 30%, #a5d6a7 0%, #43a047 50%, #1b5e20 100%);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-gradient);
            color: white;
            text-align: center;
            padding: 4rem 1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(67, 97, 238, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 15px 0 0;
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: -40px auto 40px;
            padding: 0 20px;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 4px;
        }

        /* Number generation panel */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .select-input, .text-input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border-color);
            font-size: 1rem;
            color: var(--text-main);
            background-color: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
        }

        .select-input:focus, .text-input:focus {
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        .btn-draw {
            background: linear-gradient(135deg, var(--primary) 0%, #560bad 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .btn-draw:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }

        .btn-draw:active {
            transform: translateY(0);
        }

        /* Lotto balls animation area */
        .draw-stage {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            border-radius: 16px;
            border: 2px dashed var(--border-color);
            margin: 30px 0;
            padding: 20px;
        }

        .games-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .game-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            width: 100%;
            box-sizing: border-box;
        }

        .game-row:last-child {
            border-bottom: none;
        }

        .game-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary);
        }

        .balls-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.25rem;
            color: white;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.4);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.35), 2px 4px 8px rgba(0,0,0,0.15);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .ball.yellow { background: var(--ball-yellow); }
        .ball.blue { background: var(--ball-blue); }
        .ball.red { background: var(--ball-red); }
        .ball.gray { background: var(--ball-gray); }
        .ball.green { background: var(--ball-green); }

        .analysis-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 500;
        }

        /* Filter controls */
        .advanced-options {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 20px;
            overflow: hidden;
        }

        .options-header {
            background-color: #f8fafc;
            padding: 15px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .options-content {
            padding: 20px;
            display: none;
            background-color: white;
            border-top: 1px solid var(--border-color);
        }

        .options-content.active {
            display: block;
        }

        .number-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            margin-top: 10px;
            max-height: 180px;
            overflow-y: auto;
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .num-pill {
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            background-color: #f8fafc;
            border: 1.5px solid var(--border-color);
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .num-pill:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .num-pill.include {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }

        .num-pill.exclude {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #b91c1c;
        }

        .selection-legend {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-box {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background-color: #f1f5f9;
        }

        .history-balls {
            display: flex;
            gap: 6px;
        }

        .history-ball {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            text-shadow: 0px 1px 1px rgba(0,0,0,0.3);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), 1px 2px 3px rgba(0,0,0,0.1);
        }

        .history-ball.yellow { background: var(--ball-yellow); }
        .history-ball.blue { background: var(--ball-blue); }
        .history-ball.red { background: var(--ball-red); }
        .history-ball.gray { background: var(--ball-gray); }
        .history-ball.green { background: var(--ball-green); }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            background-color: #fee2e2;
        }

        .empty-history {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 0.95rem;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            font-size: 1rem;
        }

        footer {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            background-color: white;
            margin-top: auto;
        }

        /* Responsive Utilities */
        @media (max-width: 600px) {
            header h1 {
                font-size: 2.2rem;
            }
            .card {
                padding: 20px;
            }
            .ball {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            .history-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .btn-delete {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>바이브 로또 (Vibe Lotto)</h1>
        <p>인공지능과 커스텀 필터 알고리즘이 조합하는 최상의 럭키 넘버</p>
    </header>

    <div class="container">
        <!-- 메인 생성기 카드 -->
        <div class="card">
            <div class="card-title">럭키 번호 생성하기</div>
            
            <div class="control-grid">
                <div class="control-group">
                    <label for="game-count">게임 구매 수량</label>
                    <select id="game-count" class="select-input">
                        <option value="1">1 게임 추천</option>
                        <option value="3">3 게임 추천</option>
                        <option value="5" selected>5 게임 추천 (기본)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="generation-mode">추천 모드 알고리즘</label>
                    <select id="generation-mode" class="select-input">
                        <option value="pure">완전 무작위 균등 추출</option>
                        <option value="stat">역대 빈출수 가중치 분석 추출</option>
                        <option value="vibe" selected>바이브 AI 분석 (궁합 추천)</option>
                    </select>
                </div>
            </div>

            <!-- 고급 필터 옵션 아코디언 -->
            <div class="advanced-options">
                <div class="options-header" onclick="toggleAdvancedOptions()">
                    <span>상세 번호 필터 조건 설정 (포함/제외 수)</span>
                    <span id="accordion-arrow">▼</span>
                </div>
                <div class="options-content" id="options-content">
                    <div class="selection-legend">
                        <div class="legend-item">
                            <div class="legend-box" style="background-color: #f8fafc; border: 1px solid var(--border-color);"></div>
                            <span>일반</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box" style="background-color: #dcfce7; border: 1px solid #22c55e;"></div>
                            <span>무조건 포함 (최대 5개)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box" style="background-color: #fee2e2; border: 1px solid #ef4444;"></div>
                            <span>추출에서 제외</span>
                        </div>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0 0 10px 0;">숫자를 클릭하여 상태를 변경하세요. (일반 ➔ 포함 ➔ 제외 ➔ 일반)</p>
                    <div class="number-selector-grid" id="number-selector-grid">
                        <!-- JS에서 1~45 약 알 생성 -->
                    </div>
                </div>
            </div>

            <!-- 번호 표시 스테이지 -->
            <div class="draw-stage" id="draw-stage">
                <div class="placeholder-text" id="placeholder-text">
                    추첨 버튼을 누르면 아름다운 3D 럭키 볼이 생성됩니다!
                </div>
                <div class="games-container" id="games-container" style="display: none;">
                    <!-- JS 동적 생성 -->
                </div>
            </div>

            <button class="btn-draw" onclick="generateLottoNumbers()">
                ✨ 럭키 넘버 추첨하기
            </button>
        </div>

        <!-- 히스토리 저장 카드 -->
        <div class="card">
            <div class="card-title">나의 저장된 추천 번호</div>
            <div class="history-list" id="history-list">
                <!-- JS 동적 생성 -->
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Vibe Lotto. Powered by AI Dream Algorithm. All rights reserved.
    </footer>

    <script>
        // 1~45 번호 상태 관리 (0: 일반, 1: 포함, 2: 제외)
        const numStates = Array(46).fill(0); 

        // 고급 설정 아코디언 토글
        function toggleAdvancedOptions() {
            const content = document.getElementById('options-content');
            const arrow = document.getElementById('accordion-arrow');
            content.classList.toggle('active');
            if (content.classList.contains('active')) {
                arrow.textContent = '▲';
            } else {
                arrow.textContent = '▼';
            }
        }

        // 번호 선택기 렌더링
        function initNumberSelector() {
            const grid = document.getElementById('number-selector-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 45; i++) {
                const pill = document.createElement('div');
                pill.className = 'num-pill';
                pill.textContent = i;
                pill.dataset.num = i;
                pill.onclick = () => handlePillClick(i, pill);
                grid.appendChild(pill);
            }
        }

        // 번호 클릭 핸들러 (일반 ➔ 포함 ➔ 제외 ➔ 일반)
        function handlePillClick(num, pill) {
            // 포함된 숫자의 총 개수 체크 (최대 5개까지 포함 가능)
            const includeCount = numStates.filter(s => s === 1).length;

            if (numStates[num] === 0) {
                if (includeCount >= 5) {
                    // 이미 5개이면 포함 건너뛰고 바로 제외로
                    numStates[num] = 2;
                    pill.className = 'num-pill exclude';
                } else {
                    numStates[num] = 1;
                    pill.className = 'num-pill include';
                }
            } else if (numStates[num] === 1) {
                numStates[num] = 2;
                pill.className = 'num-pill exclude';
            } else {
                numStates[num] = 0;
                pill.className = 'num-pill';
            }
        }

        // 공 색상 클래스 가져오기
        function getBallColorClass(num) {
            if (num >= 1 && num <= 10) return 'yellow';
            if (num >= 11 && num <= 20) return 'blue';
            if (num >= 21 && num <= 30) return 'red';
            if (num >= 31 && num <= 40) return 'gray';
            return 'green';
        }

        // 로또 추출 알고리즘 핵심
        function drawSingleGame() {
            const includes = [];
            const excludes = [];
            for (let i = 1; i <= 45; i++) {
                if (numStates[i] === 1) includes.push(i);
                if (numStates[i] === 2) excludes.push(i);
            }

            const candidates = [];
            for (let i = 1; i <= 45; i++) {
                if (!excludes.includes(i) && !includes.includes(i)) {
                    candidates.push(i);
                }
            }

            // 역대 가중치나 바이브 모드를 고려한 무작위 추출 가상 구현
            const mode = document.getElementById('generation-mode').value;
            const finalNumbers = [...includes];

            // 필요한 여분의 숫자 수
            const needed = 6 - finalNumbers.length;

            if (candidates.length < needed) {
                alert("제외한 숫자가 너무 많아 로또 번호를 생성할 수 없습니다. 필터에서 제외할 번호를 줄여주세요.");
                return null;
            }

            // 가중치 배열 설정
            let selectionPool = [...candidates];
            if (mode === 'stat' || mode === 'vibe') {
                // 특정 패턴 수(예: 3의 배수, 홀수 가중치 등)에 가중치를 주는 연출용 알고리즘
                selectionPool = [];
                candidates.forEach(num => {
                    let weight = 1;
                    if (mode === 'stat') {
                        // 자주 나오는 행운 번호 패턴 가중치 (3, 7, 12, 17, 22, 33, 45 등)
                        if ([3, 7, 12, 17, 22, 33, 44, 45].includes(num)) weight = 3;
                    } else if (mode === 'vibe') {
                        // 끝자리 대칭, 홀수 궁합 조합 가중치
                        if (num % 2 !== 0) weight = 2;
                    }
                    for (let w = 0; w < weight; w++) {
                        selectionPool.push(num);
                    }
                });
            }

            // 무작위 추천 번호 선택
            while (finalNumbers.length < 6) {
                const randIndex = Math.floor(Math.random() * selectionPool.length);
                const chosen = selectionPool[randIndex];
                if (!finalNumbers.includes(chosen)) {
                    finalNumbers.push(chosen);
                }
            }

            // 번호 정렬
            finalNumbers.sort((a, b) => a - b);
            return finalNumbers;
        }

        // 로또 번호 생성
        function generateLottoNumbers() {
            const gameCount = parseInt(document.getElementById('game-count').value);
            const gamesContainer = document.getElementById('games-container');
            const placeholder = document.getElementById('placeholder-text');

            placeholder.style.display = 'none';
            gamesContainer.style.display = 'flex';
            gamesContainer.innerHTML = '';

            const drawnGames = [];

            for (let g = 0; g < gameCount; g++) {
                const numbers = drawSingleGame();
                if (!numbers) return; // 실패 시 중단

                drawnGames.push(numbers);

                // 통계 데이터 계산
                const sum = numbers.reduce((acc, curr) => acc + curr, 0);
                const oddCount = numbers.filter(n => n % 2 !== 0).length;
                const evenCount = 6 - oddCount;

                // UI 생성
                const gameRow = document.createElement('div');
                gameRow.className = 'game-row';

                const headerDiv = document.createElement('div');
                headerDiv.style.display = 'flex';
                headerDiv.style.justifyContent = 'space-between';
                headerDiv.style.width = '100%';
                headerDiv.style.alignItems = 'center';

                const titleSpan = document.createElement('span');
                titleSpan.className = 'game-title';
                titleSpan.textContent = `제 ${g + 1} 게임`;
                headerDiv.appendChild(titleSpan);

                const badgesDiv = document.createElement('div');
                badgesDiv.style.display = 'flex';
                badgesDiv.style.gap = '8px';

                const sumBadge = document.createElement('span');
                sumBadge.className = 'analysis-badge';
                sumBadge.textContent = `합계: ${sum}`;
                
                const ratioBadge = document.createElement('span');
                ratioBadge.className = 'analysis-badge';
                ratioBadge.textContent = `홀:짝 ${oddCount}:${evenCount}`;

                badgesDiv.appendChild(sumBadge);
                badgesDiv.appendChild(ratioBadge);
                headerDiv.appendChild(badgesDiv);

                gameRow.appendChild(headerDiv);

                const ballsRow = document.createElement('div');
                ballsRow.className = 'balls-row';

                numbers.forEach((num, index) => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    // 순차 팝업 딜레이 적용
                    ball.style.animationDelay = `${(g * 0.15) + (index * 0.08)}s`;
                    ballsRow.appendChild(ball);
                });

                gameRow.appendChild(ballsRow);
                gamesContainer.appendChild(gameRow);
            }

            // 첫 게임을 히스토리에 자동으로 백업 저장
            if (drawnGames.length > 0) {
                saveToHistory(drawnGames[0]);
            }
        }

        // 히스토리 로컬 스토리지에 저장
        function saveToHistory(numbers) {
            let history = JSON.parse(localStorage.getItem('vibe_lotto_history')) || [];
            
            // 중복 확인
            const isDuplicate = history.some(item => JSON.stringify(item.numbers) === JSON.stringify(numbers));
            if (isDuplicate) return;

            const newItem = {
                id: Date.now(),
                numbers: numbers,
                date: new Date().toLocaleDateString('ko-KR')
            };

            history.unshift(newItem); // 최신 내역 처음에 추가
            
            // 최대 20개까지만 보관
            if (history.length > 20) {
                history.pop();
            }

            localStorage.setItem('vibe_lotto_history', JSON.stringify(history));
            renderHistory();
        }

        // 히스토리 삭제
        function deleteHistoryItem(id) {
            let history = JSON.parse(localStorage.getItem('vibe_lotto_history')) || [];
            history = history.filter(item => item.id !== id);
            localStorage.setItem('vibe_lotto_history', JSON.stringify(history));
            renderHistory();
        }

        // 히스토리 화면 렌더링
        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('vibe_lotto_history')) || [];

            list.innerHTML = '';

            if (history.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-history';
                empty.textContent = '아직 저장된 번호 조합이 없습니다.';
                list.appendChild(empty);
                return;
            }

            history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'history-item';

                const infoDiv = document.createElement('div');
                infoDiv.style.display = 'flex';
                infoDiv.style.flexDirection = 'column';
                infoDiv.style.gap = '4px';

                const dateSpan = document.createElement('span');
                dateSpan.style.fontSize = '0.75rem';
                dateSpan.style.color = 'var(--text-muted)';
                dateSpan.textContent = item.date;
                infoDiv.appendChild(dateSpan);

                const ballsDiv = document.createElement('div');
                ballsDiv.className = 'history-balls';

                item.numbers.forEach(num => {
                    const hBall = document.createElement('div');
                    hBall.className = `history-ball ${getBallColorClass(num)}`;
                    hBall.textContent = num;
                    ballsDiv.appendChild(hBall);
                });
                infoDiv.appendChild(ballsDiv);
                el.appendChild(infoDiv);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerHTML = '🗑️ 삭제';
                delBtn.onclick = () => deleteHistoryItem(item.id);
                el.appendChild(delBtn);

                list.appendChild(el);
            });
        }

        // 페이지 로드 시 초기화
        window.onload = () => {
            initNumberSelector();
            renderHistory();
        };
    </script>
</body>
</html>
